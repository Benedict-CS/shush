server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Trust real IP from upstream reverse proxy / Cloudflare
    set_real_ip_from 0.0.0.0/0;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # Gzip text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 512;

    # Long-cache static assets that have content hashes / are stable
    location ~* \.(svg|mp3|wav|ogg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # JS library can be cached long
    location /vendor/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Service worker MUST NOT be cached aggressively (browser pulls fresh)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # Manifest can be short-cached
    location = /manifest.json {
        add_header Cache-Control "public, max-age=3600";
    }

    # Main HTML always revalidate
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = / {
        add_header Cache-Control "no-cache";
        try_files /index.html =404;
    }

    # SPA-style fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Disable access log for healthcheck noise
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
